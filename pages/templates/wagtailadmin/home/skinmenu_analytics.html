<section class="sm-admin-panel">
    <h2>Analytics</h2>
    <p class="sm-admin-muted">Connect analytics to see real-time visits and conversion data here.</p>

    <div class="sm-admin-panel__list">
        <div class="sm-admin-panel__list-item">
            <div>
                <strong>GA4</strong>
                <div class="sm-admin-muted sm-admin-helper">Measurement ID</div>
            </div>
            {% if ga4_connected %}
                <span class="sm-admin-pill sm-admin-pill--success">Connected</span>
            {% else %}
                <span class="sm-admin-pill sm-admin-pill--muted">Not connected</span>
            {% endif %}
        </div>
        <div class="sm-admin-panel__list-item">
            <div>
                <strong>Meta Pixel</strong>
                <div class="sm-admin-muted sm-admin-helper">Marketing events</div>
            </div>
            {% if meta_connected %}
                <span class="sm-admin-pill sm-admin-pill--success">Connected</span>
            {% else %}
                <span class="sm-admin-pill sm-admin-pill--muted">Not connected</span>
            {% endif %}
        </div>
    </div>

    <div class="sm-admin-panel__actions">
        <a class="button button-secondary" href="{% url 'wagtailsettings:edit' 'site_settings' 'analyticssettings' %}">Configure analytics</a>
    </div>
</section>
