<div class="space-y-4 md:space-y-5">
  {% if block.eyebrow %}
    <div class="label-display">{{ block.eyebrow }}</div>
  {% endif %}
  {% if block.heading %}
    <h2 class="text-2xl md:text-3xl text-heading">{{ block.heading }}</h2>
  {% endif %}
  {% if block.body %}
    <div class="prose max-w-none text-fg/85">
      {{ block.body|richtext }}
    </div>
  {% endif %}
</div>
