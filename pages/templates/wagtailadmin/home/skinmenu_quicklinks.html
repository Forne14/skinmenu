<section class="sm-admin-panel">
    <h2>Quick links</h2>
    <p class="sm-admin-muted">Jump straight into the most edited areas.</p>
    <div class="sm-admin-panel__list">
        {% for link in quicklinks %}
            {% if link.url %}
                <a class="sm-admin-panel__list-item" href="{{ link.url }}">
                    <div>
                        <strong>{{ link.label }}</strong>
                        {% if link.helper %}
                            <div class="sm-admin-muted sm-admin-helper">{{ link.helper }}</div>
                        {% endif %}
                    </div>
                    <span class="sm-admin-pill sm-admin-pill--primary">Open</span>
                </a>
            {% else %}
                <div class="sm-admin-panel__list-item is-disabled">
                    <div>
                        <strong>{{ link.label }}</strong>
                        {% if link.helper %}
                            <div class="sm-admin-muted sm-admin-helper">{{ link.helper }}</div>
                        {% endif %}
                    </div>
                    <span class="sm-admin-pill sm-admin-pill--muted">Unavailable</span>
                </div>
            {% endif %}
        {% endfor %}
    </div>
</section>
